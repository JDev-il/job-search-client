<inner-navigation
  [links]="innerLinks"
  (emitPath)="currentPath($event)"
></inner-navigation>
<ng-container>
  <div class="dashboard-filters">
    <app-filter
      [hidden]="isFilter()"
      (filterValue)="filterDataByDays($event)"
      [currentDayFilter]="filteredDays()"
      [isDataLength]="isData"
    ></app-filter>
  </div>
</ng-container>
<ng-container>
  <div class="dashboard-components-container">
    <div class="dashboard-components-wrapper" fader>
      <router-outlet></router-outlet>
    </div>
  </div>
</ng-container>
