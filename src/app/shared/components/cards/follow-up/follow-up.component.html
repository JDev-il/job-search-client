@for (entry of followUps()?.entries; track $index) {
  <mat-card class="actions-card" appearance="outlined">
    <mat-card-header>
      <mat-card-title>{{ entry.companyName }}</mat-card-title>
    </mat-card-header>
    <mat-card-content> </mat-card-content>
    <mat-card-footer class="example-card-footer">
      <mat-chip-set aria-label="Chihuahua traits">
        <mat-chip>{{ entry.status }}</mat-chip>
        <mat-chip>{{ entry.urgency }}</mat-chip>
        <mat-chip>{{ entry.daysElapsed }}</mat-chip>
      </mat-chip-set>
    </mat-card-footer>
  </mat-card>
}
