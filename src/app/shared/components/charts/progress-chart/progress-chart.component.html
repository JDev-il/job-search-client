<div class="chart-generic-container">
  @if (isChartsReady.isProgressChart()) {
  <div class="chart-data">
    <canvas baseChart
      [type]="progressChartOptions().type"
      [data]="progressChartOptions().data"
      [options]="progressChartOptions().options"
    ></canvas>
  </div>
  } @else {
  <div class="chart-no-data">
    <h3>No Data</h3>
  </div>
  }
</div>
