<div class="chart-generic-container">
  <div class="market-chart-container">
    @if (isChartsReady.isMarketChart()) {
    <div class="chart-data">
      <canvas baseChart
        [type]="marketChartOptions().type"
        [data]="marketChartOptions().data"
        [options]="marketChartOptions().options"
      ></canvas>
    </div>
    } @else {
    <div class="chart-no-data">
      <h3>No Data</h3>
    </div>
    }
  </div>
</div>
