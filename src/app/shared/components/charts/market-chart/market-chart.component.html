<div class="chart-generic-container">
  <div class="market-chart-container">
    @if (isChartsReady.isMarketChart()) {
    <div class="chart-data">
      <apx-chart
        [series]="marketChartOptions().series"
        [chart]="marketChartOptions().chart"
        [title]="marketChartOptions().title"
        [fill]="marketChartOptions().fill"
        [stroke]="marketChartOptions().stroke"
        [markers]="marketChartOptions().markers"
        [yaxis]="marketChartOptions().yaxis"
        [xaxis]="marketChartOptions().xaxis"
        [tooltip]="marketChartOptions().tooltip"
      ></apx-chart>
    </div>
    } @else {
    <div class="chart-no-data">
      <h3>No Data</h3>
    </div>
    }
  </div>
</div>
