<div class="forms-host">
  <section class="login-form-container">
    <form [formGroup]="loginForm" custom-mat-form (submit)="submitLogin()">
      <div class="form-wrapper">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input
            matInput
            formControlName="email"
            placeholder="Enter your email"
          />
          @if (loginForm.get('email')?.hasError('required')) {
          <mat-error>Email is required</mat-error>
          } @if (loginForm.get('email')?.hasError('email')) {
          <mat-error>Enter a valid email</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input
            matInput
            type="password"
            formControlName="password"
            placeholder="Enter your password"
          />
          @if (loginForm.get('password')?.hasError('required')) {
          <mat-error>Password is required</mat-error>
          }
        </mat-form-field>
      </div>
      <div class="buttons-div">
        <button mat-raised-button [disabled]="loginForm.invalid">Login</button>
        <button
          type="button"
          mat-raised-button
          (click)="toRegister()"
          class="to-register-button"
          appHover
        >
          {{ loginbuttonText }}
        </button>
      </div>
    </form>
    <div class="google-wrapper">
      <app-google></app-google>
    </div>
    <!-- <div class="google-section"> -->
      <!-- <div class="divider"><span>or</span></div> -->
      <!-- <button type="button" mat-stroked-button (click)="signInWithGoogle()" class="google-btn"> -->
        <!-- <img src="assets/icons/google.svg" alt="" width="18" height="18" /> -->
        <!-- Continue with Google -->
      <!-- </button> -->
    <!-- </div> -->
  </section>
</div>

<div SnackBar #snackBarRef="SnackBar"></div>
<app-spinner [isSpinner]="spinnerState" [isActivityTable]="false" />
